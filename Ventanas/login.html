<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="/Css/login.css">
</head>

<body>
    <div class="container" id="container">

        <div class="form-container sign-in-container">
            <form action="#">
                <h1>Iniciar Sesión</h1>
                <button class="google-btn"> <img src="/Recursos/icons/google.png" alt="Google"> <a href="index.html">Iniciar sesión con Google</a></button>
                <!--Apartado para el correo electronico-->
                <input type="email" placeholder="Correo Electrónico" required />
                <input type="password" placeholder="Contraseña" required checked/>
                <a href="#">¿Olvidaste tu contraseña?</a>
                <button type="submit">Iniciar Sesión <a href="index.html"></a></button>
                <p>¿No tienes una cuenta? <button class="ghost" id="signUp">Registrarse</button> </p>
            </form>
        </div>

        <div class="form-container sign-up-container">
            <form action="#">
                <h1>Crear Cuenta</h1>
                <button class="google-btn"> <img src="/Recursos/icons/google.png" alt="Google"><a href="index.html">Registrarse con Google</a></button>
                <input type="text" placeholder="Nombre" required/>
                <input type="text" placeholder="Apellidos" required />

                <!--Apartado para el numero telefonico debe de contener 10 digitos-->
                <input type="number" placeholder="Teléfono celular" 
                     pattern="[0-9]{10}" title="El número de teléfono debe contener 10 dígitos" required />
                <!--Apartado para el correo electronico a@a.com-->
                <input type="email" placeholder="Correo Electrónico" title="Por favor, ingrese un correo electrónico válido" required />
                <!--Apartado para la contraseña debe de contener al menos 8 caracteres y un numero-->
                <input type="text" placeholder="Dirección"
                         pattern="^([a-zA-Z0-9._%+-]+)$" required />  
                <input type="password" placeholder="Contraseña" 
                         minlength="4" required />
                <input name="confirm-password" type="password" class="passConfirm" placeholder="Confirmar Contraseña" required />
                            <div class="error-message" style="color: red; display: none;">Las contraseñas no coinciden</div>
                <button type="submit">Registrarse</button>
                <p>¿Ya tienes una cuenta? <button class="ghost" id="signIn">Iniciar Sesión</button> </p>
            </form>
        </div>
    </div>
    
</body>
<script src="/Js/login.js"></script>
</html>
