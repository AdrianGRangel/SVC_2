<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
<link rel="stylesheet" href="/Css/menu.css">
<link rel="stylesheet" href="/Css/perfil.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <button id="menutoggles" onclick="menu.classList.toggle('active')">
                <img src="/Recursos/icons/menu.svg" alt="Menu">
            </button>
        <h1>Mi Perfil</h1>
        </div>

        <div id="usuario">
            <h3 id="welcome">Usuario</h3>
            <button id="cerrarSesion">
                <a href="login.html"><img src="/Recursos/icons/login.svg" alt="Cerrar Sesión"></a>
            </button>
        </div>
    </header>

    <!--Es el menu despegable para acceder a las paginas-->
    <aside id="menu">
        <nav class="menu-links">
            <div class="menu-header">
                <h2>Menú</h2>
                <button id="close-btn" onclick="menu.classList.remove('active')">
                    <h3>X</h3>
                </button>
            </div>
        <hr>
        <ul>
            <a href="index.html"><img src="/Recursos/icons/home.svg">Inicio</a>
            <a href="reportes.html"><img src="/Recursos/icons/docs.svg">Reportes</a>
            <a href="perfil.html"><img src="/Recursos/icons/person.svg">Perfil</a>
            <a href="recompensa.html"><img src="/Recursos/icons/trophy.svg">Recompensas</a>
            <a href="notificaciones.html"><img src="/Recursos/icons/bell.svg">Notificaciones</a>
            <a href="historial.html"><img src="/Recursos/icons/history.svg">Historial</a>
        </ul>
        </nav>
    </aside>

    <main>
        <div class="perfil">
            <h2>Mi perfil</h2>
            <p>Administración de tu información personal</p>
            <div class="foto">
                <div class="img-container">
                <img src="/Recursos/icons/person.svg">
                </div>
                <h3 id="usuario">Usuario</h3>
                <p id="correo">correo</p>
                <hr>
            </div>

            <div class="container-informacion">
                <form id="form-perfil">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="nombre" readonly>

                    <label>Apellidos</label>
                    <input type="text" id="apellidos" placeholder="apellidos" readonly>

                    <label>Teléfono</label>
                    <input type="number" id="telefono" placeholder="telefono" readonly>

                    <label>Correo Electronico</label>
                    <input type="email" id="correo" placeholder="correo" readonly>

                    <label>Dirección</label>
                    <input type="text" id="direccion" placeholder="direccion" readonly>

                    <div id="seccion-password" style="display: none; margin-top: 20px;">
                        <label>Contraseña</label>
                        <input type="password" id="password" placeholder="contraseña">
                        <label>Confirmar Contraseña</label>
                        <input type="password" id="confirm-password" placeholder="confirmar contraseña">
                    </div>

                    <div id="botones">
                    <button type="button" id="btn-editar">Editar perfil</button>
                    <button type="button" id="btn-pass">Cambiar contraseña</button>
                    <button type="submit" id="btn-guardar">Guardar cambios</button>
                    </div>
                </form>
            </div>

            <div class="conteiner-recompensas">
                <img src="/Recursos/icons/trophy.svg"> <h2 id="titile-card">Tarjetas de regalo y transferencias</h2>
                
            </div>

        </div>
    </main>
</body>
<script src="/Js/perfil.js"></script>
</html>
