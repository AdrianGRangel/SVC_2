<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil</title>
    <link rel="stylesheet" href="/Css/menu.css" />
    <link rel="stylesheet" href="/Css/perfil.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="nav-left">
        <button id="menutoggles" onclick="menu.classList.toggle('active')">
          <img src="/Recursos/icons/menu.svg" alt="Menu" />
        </button>
        <h1>Mi Perfil</h1>
      </div>

      <div id="usuario">
        <h3 id="welcome">Usuario</h3>
        <button id="cerrarSesion">
          <a href="login.html"
            ><img src="/Recursos/icons/login.svg" alt="Cerrar Sesión"
          /></a>
        </button>
      </div>
    </header>

    <!--Es el menu despegable para acceder a las paginas-->
    <aside id="menu">
      <nav class="menu-links">
        <div class="menu-header">
          <h2>Menú</h2>
          <button id="close-btn" onclick="menu.classList.remove('active')">
            <h3>X</h3>
          </button>
        </div>
        <hr />
        <ul>
          <a href="index.html"><img src="/Recursos/icons/home.svg" />Inicio</a>
          <a href="reportes.html"
            ><img src="/Recursos/icons/docs.svg" />Reportes</a
          >
          <a href="perfil.html"
            ><img src="/Recursos/icons/person.svg" />Perfil</a
          >
          <a href="recompensa.html"
            ><img src="/Recursos/icons/trophy.svg" />Recompensas</a
          >
          <a href="notificaciones.html"
            ><img src="/Recursos/icons/bell.svg" />Notificaciones</a
          >
          <a href="historial.html"
            ><img src="/Recursos/icons/history.svg" />Historial</a
          >
        </ul>
      </nav>
    </aside>

    <main>
      <div class="perfil">
        <h2>Mi perfil</h2>
        <p>Administración de tu información personal</p>
        <div class="foto">
          <div class="img-container">
            <img src="/Recursos/icons/person.svg" />
          </div>
          <h3 id="usuariotexto">Usuario</h3>
          <p id="correotexto">correo</p>
          <hr />
        </div>

        <div class="container-informacion">
          <form id="form-perfil">
            <label>Nombre</label>
            <input type="text" id="nombre" readonly />

            <label>Apellidos</label>
            <input type="text" id="apellidos" readonly />

            <label>Teléfono</label>
            <input type="number" id="telefono" readonly />

            <label>Correo Electronico</label>
            <input type="email" id="correo" readonly />

            <label>Dirección</label>
            <input type="text" id="direccion" readonly />

            <div class="botones-container">
              <button type="button" id="btn-editar-perfil" class="btn-editar">
                Editar perfil
              </button>
              <button
                type="button"
                id="btn-abrir-pass"
                onclick="abrirModalPass()"
                class="btn-pass"
              >
                Cambiar contraseña
              </button>

              <button
                type="button"
                id="btn-cancelar-edicion"
                class="btn-cancelar"
                style="display: none"
              >
                Cancelar
              </button>
              <button
                type="submit"
                id="btn-guardar-cambios"
                class="btn-guardar"
                style="display: none"
              >
                Guardar cambios
              </button>
            </div>
          </form>
        </div>

        <div id="modal-password" class="modal-overlay">
          <div class="modal-content">
            <h3>Cambiar contraseña</h3>
            <p>Introduce tu nueva clave de acceso.</p>

            <label>Nueva contraseña</label>
            <input type="password" id="nueva-pass" placeholder="********" />
            <span id="error-pass" class="error-message"></span>
            <label>Confirmar contraseña</label>
            <input type="password" id="confirmar-pass" placeholder="********" />
            <span id="error-confirmar-pass" class="error-message"></span>
            <div class="modal-buttons">
              <button
                type="button"
                class="btn-cancelar"
                onclick="cerrarModalPass()"
              >
                Cancelar
              </button>
              <button
                type="button"
                class="btn-guardar"
                onclick="simularGuardarPass()"
              >
                Actualizar
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="/Js/usuario.js"></script>
    <script src="/Js/perfil.js"></script>
  </body>
</html>
